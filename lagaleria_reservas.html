<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>La Galería — Reservas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111417;--surf:#1a2226;--nav:#22292D;--brd:#2e3a3f;--brd2:#3a4a50;
  --txt:#f0ece4;--muted:#a8b8bf;--dim:#7a8f96;--faint:#4a5a60;
  --acc:#C5A669;--acc-bg:rgba(197,166,105,0.12);--acc-bd:rgba(197,166,105,0.35);
  --red:#cc4444;--red-bg:rgba(180,50,50,0.15);--red-bd:rgba(180,50,50,0.4);
  --amb:#c89030;--amb-bg:rgba(180,130,0,0.15);--amb-bd:rgba(180,130,0,0.4);
  --grn:#4a9a5a;--grn-bg:rgba(60,140,70,0.12);--grn-bd:rgba(60,140,70,0.3);
}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding-bottom:80px}

/* MAIN TABS */
.main-tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:90}
.mtab{flex:1;padding:13px 8px;text-align:center;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.mtab.act{color:var(--acc);border-bottom-color:var(--acc)}
.mtab svg{opacity:.6}.mtab.act svg{opacity:1}

/* ZONA FILTER BAR */
.zona-bar{display:flex;gap:6px;padding:8px 14px;background:var(--bg);position:sticky;top:46px;z-index:89;border-bottom:1px solid var(--brd);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.zona-bar::-webkit-scrollbar{display:none}
.zpill{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;border:1px solid var(--brd2);background:var(--surf);color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.zpill.act{background:var(--acc);border-color:var(--acc);color:#1a1810}
.zpill-icon{font-size:14px;line-height:1}
.zpill-txt{font-size:12px}
@media(max-width:480px){
  .zpill{padding:6px 8px}
  .zpill-txt{display:none}
  .zpill-icon{font-size:16px}
}

/* DATE NAV */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;gap:8px}
.date-nav-center{display:flex;align-items:center;gap:8px}
.date-main{font-size:13px;font-weight:700;color:var(--txt)}
.date-sub{font-size:11px;color:var(--dim)}
.nav-arrow{background:var(--surf);border:1px solid var(--brd2);border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--acc);font-size:18px;flex-shrink:0}
.nav-arrow:active{opacity:.7}
.mesas-pill{display:flex;align-items:center;gap:6px;background:var(--acc-bg);border:1px solid var(--acc-bd);border-radius:20px;padding:7px 12px;cursor:pointer}
.mesas-pill-num{font-size:13px;font-weight:700;color:var(--acc)}
.mesas-pill-lbl{font-size:11px;color:var(--acc);opacity:.8}

/* MESAS DETAIL */
.mesas-detail{margin:0 14px 8px;background:var(--surf);border:1px solid var(--brd);border-radius:10px;overflow:hidden;display:none}
.mesas-detail.show{display:block}
.mz-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--brd)}
.mz-row:last-child{border-bottom:none}
.mz-name{font-size:12px;font-weight:600;color:var(--txt)}
.mz-count{font-size:12px;font-weight:700;color:var(--acc)}

/* SEC HDR */
.sec-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px 6px}
.sec-line{flex:1;height:1px;background:var(--brd)}
.sec-lbl{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;display:flex;align-items:center;gap:6px}
.sec-badge{background:var(--surf);border:1px solid var(--brd2);color:var(--muted);border-radius:10px;font-size:11px;font-weight:700;padding:1px 7px}

/* RES CARD */
.res-card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px 12px 10px 16px;margin:0 14px 8px;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden}
.res-card:active{opacity:.85}
.res-stripe{position:absolute;left:0;top:0;bottom:0;width:4px}
.res-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.res-name{font-size:13px;font-weight:700;color:var(--txt);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res-badge{border-radius:10px;font-size:10px;font-weight:700;padding:2px 8px;flex-shrink:0}
.res-meta{display:flex;flex-wrap:wrap;gap:6px 10px}
.res-meta-item{font-size:11px;color:var(--muted)}

/* ADD BTN */
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:10px;background:transparent;border:1.5px dashed var(--acc-bd);color:var(--acc);font-size:13px;font-weight:600;cursor:pointer;margin:4px 0}

/* EMPTY */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--dim)}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--nav);border:1px solid var(--brd2);border-radius:14px;padding:18px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:700;color:var(--txt)}
.modal-sub{font-size:11px;color:var(--dim);margin-top:3px}
.mclose{background:none;border:none;font-size:22px;color:var(--dim);cursor:pointer;line-height:1;padding:0 2px}

/* FORM */
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;background:var(--bg);border:1px solid var(--brd2);border-radius:8px;padding:9px 12px;color:var(--txt);font-size:13px;outline:none}
.inp:focus{border-color:var(--acc-bd)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-confirm{background:var(--acc);border:none;border-radius:8px;padding:12px;width:100%;font-size:13px;font-weight:700;color:#1a1810;cursor:pointer;margin-top:8px}
.btn-confirm:active{opacity:.85}
.btn-del{background:transparent;border:1px solid var(--red-bd);border-radius:8px;padding:10px;width:100%;font-size:12px;font-weight:600;color:var(--red);cursor:pointer;margin-top:6px}

/* DETAIL MODAL */
.est-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.est-pill{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .2s}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.info-box{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.info-val{font-size:18px;font-weight:700;color:var(--acc)}
.info-lbl{font-size:10px;color:var(--dim);margin-top:2px}
.tel-row{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:8px;padding:10px 12px}
.tel-num{font-size:13px;font-weight:600;color:var(--txt);flex:1}
.tel-actions{display:flex;gap:8px}
.tel-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;text-decoration:none}
.tel-btn:active{opacity:.7}
.tel-call{background:rgba(85,153,187,.15);color:#5599bb}
.tel-wa{background:rgba(37,211,102,.15);color:#25D366}

/* STEPPER FIELD */
.stepper-field{display:flex;align-items:center;gap:4px}
.step-btn{width:36px;height:36px;flex-shrink:0;border-radius:8px;border:1px solid var(--brd2);background:var(--nav);color:var(--txt);font-size:20px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center}
.step-btn:active{background:var(--brd2)}
.step-inp{text-align:center;flex:1;min-width:0}
/* hide number arrows */
.step-inp::-webkit-inner-spin-button,.step-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.step-inp{-moz-appearance:textfield}

/* ZONA PILLS in form */
.zona-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.zona-pill{padding:7px 12px;border-radius:20px;border:1px solid var(--brd2);background:var(--surf);color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.zona-pill.act{background:var(--acc-bg);border-color:var(--acc-bd);color:var(--acc)}

/* ESTADO PILLS in detail and form — same component */
.est-pills{display:flex;flex-wrap:wrap;gap:6px}
.est-pill{padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .2s}

</style>
</head>
<body>

<!-- MAIN TABS -->
<div class="main-tabs">
  <div class="mtab act" id="tab-res" onclick="setTab('res')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    Reservas
  </div>
  <div class="mtab" id="tab-ev" onclick="setTab('ev')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    Eventos
  </div>
  <div class="mtab" id="tab-zon" onclick="setTab('zon')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Zonas
  </div>
</div>

<!-- RESERVAS VIEW -->
<div id="view-res">

  <!-- ZONA FILTER BAR -->
  <div class="zona-bar" id="zona-bar">
    <div class="zpill act" onclick="setZona('all',this)"><span class="zpill-icon">✦</span><span class="zpill-txt">Todo</span></div>
    <div class="zpill" onclick="setZona(1,this)"><span class="zpill-icon">☀️</span><span class="zpill-txt">Terraza</span></div>
    <div class="zpill" onclick="setZona(2,this)"><span class="zpill-icon">🚪</span><span class="zpill-txt">Entrada</span></div>
    <div class="zpill" onclick="setZona(3,this)"><span class="zpill-icon">🍷</span><span class="zpill-txt">Barra</span></div>
    <div class="zpill" onclick="setZona(4,this)"><span class="zpill-icon">🪑</span><span class="zpill-txt">Sala</span></div>
    <div class="zpill" onclick="setZona(5,this)"><span class="zpill-icon">🎭</span><span class="zpill-txt">Salón</span></div>
  </div>

  <!-- DATE NAV -->
  <div class="date-nav">
    <div style="display:flex;align-items:center;gap:6px">
      <button class="nav-arrow" onclick="changeDay(-1)">&#8249;</button>
      <div>
        <div class="date-main" id="res-date-lbl">Hoy — 21 mayo</div>
        <div class="date-sub" id="res-year-lbl">2026</div>
      </div>
      <button class="nav-arrow" onclick="changeDay(1)">&#8250;</button>
    </div>
    <div class="mesas-pill" onclick="toggleMesas()">
      <span class="mesas-pill-num" id="mesas-num">—</span>
      <span class="mesas-pill-lbl">libres</span>
    </div>
  </div>

  <!-- MESAS DETAIL -->
  <div class="mesas-detail" id="mesas-detail"></div>

  <!-- LIST -->
  <div id="res-list"></div>

</div>

<!-- EVENTOS VIEW -->
<div id="view-ev" style="display:none;padding:20px 14px">
  <div class="empty"><div class="empty-icon">🎉</div><div class="empty-title">Eventos</div><div class="empty-sub">Próximamente</div></div>
</div>

<!-- ZONAS VIEW -->
<div id="view-zon" style="display:none">
  <div id="zon-list" style="padding:10px 0"></div>
  <div style="padding:0 14px 14px"><button class="add-btn" onclick="openNewZona()">+ Nueva zona</button></div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="ov-detail" onclick="if(event.target===this)closeModal('ov-detail')">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-title" id="det-nombre"></div>
        <div class="modal-sub" id="det-sub"></div>
      </div>
      <button class="mclose" onclick="closeModal('ov-detail')">&#215;</button>
    </div>
    <div id="det-body"></div>
  </div>
</div>

<!-- EDIT OVERLAY -->
<div class="overlay" id="ov-edit" onclick="if(event.target===this)closeModal('ov-edit')">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-title" id="edit-title">Reserva</div>
        <div class="modal-sub" id="edit-sub"></div>
      </div>
      <button class="mclose" onclick="closeModal('ov-edit')">&#215;</button>
    </div>

    <!-- NOMBRE + TEL -->
    <div class="field"><label>Nombre</label><input class="inp" id="e-nombre" placeholder="Familia García..."></div>
    <div class="field"><label>Teléfono</label><input class="inp" id="e-tel" type="tel" placeholder="6XX XXX XXX"></div>

    <!-- FECHA + HORA -->
    <div class="row2">
      <div class="field"><label>Fecha</label><input class="inp" id="e-fecha" type="date"></div>
      <div class="field"><label>Hora</label><input class="inp" id="e-hora" type="time"></div>
    </div>

    <!-- PAX + MESAS con steppers táctiles -->
    <div class="row2">
      <div class="field">
        <label>Personas</label>
        <div class="stepper-field">
          <button class="step-btn" onclick="stepField('e-pax',-1,1,99,autoPax)">−</button>
          <input class="inp step-inp" id="e-pax" type="number" min="1" max="99" placeholder="4" oninput="autoPax()">
          <button class="step-btn" onclick="stepField('e-pax',1,1,99,autoPax)">+</button>
        </div>
      </div>
      <div class="field">
        <label>Mesas</label>
        <div class="stepper-field">
          <button class="step-btn" onclick="stepField('e-mesas',-1,1,20,autoMesas)">−</button>
          <input class="inp step-inp" id="e-mesas" type="number" min="1" max="20" placeholder="1" oninput="autoMesas()">
          <button class="step-btn" onclick="stepField('e-mesas',1,1,20,autoMesas)">+</button>
        </div>
      </div>
    </div>

    <!-- ZONA — pills táctiles -->
    <div class="field">
      <label>Zona</label>
      <div class="zona-pills" id="e-zona-pills"></div>
    </div>

    <!-- ESTADO — pills táctiles -->
    <div class="field">
      <label>Estado</label>
      <div class="est-pills" id="e-estado-pills"></div>
    </div>

    <!-- NOTA -->
    <div class="field"><label>Nota</label><input class="inp" id="e-nota" placeholder="Alérgicos, tarta, cumpleaños..."></div>

    <button class="btn-confirm" onclick="saveRes()">Guardar reserva</button>
    <button class="btn-del" id="btn-del-res" onclick="delRes()" style="display:none">Eliminar reserva</button>
  </div>
</div>

<!-- ZONA EDIT OVERLAY -->
<div class="overlay" id="ov-zona" onclick="if(event.target===this)closeModal('ov-zona')">
  <div class="modal">
    <div class="modal-hdr">
      <div><div class="modal-title" id="zona-title">Zona</div></div>
      <button class="mclose" onclick="closeModal('ov-zona')">&#215;</button>
    </div>
    <div class="field"><label>Nombre</label><input class="inp" id="z-nombre" placeholder="Terraza..."></div>
    <div class="field"><label>Emoji</label><input class="inp" id="z-emoji" placeholder="☀️"></div>
    <div class="field"><label>Mesas disponibles</label><input class="inp" id="z-mesas" type="number" min="1" placeholder="8"></div>
    <button class="btn-confirm" onclick="saveZona()">Guardar</button>
    <button class="btn-del" id="btn-del-zona" onclick="delZona()" style="display:none">Eliminar zona</button>
  </div>
</div>

<script>
/* ── DATA ── */
const PAX_PER_MESA = 3;
let curZona = 'all', curDay = '', editingId = null, editingZonaId = null;
let nid = 100;

const ESTADOS = {
  pagada:    {label:'Pagada',    color:'#4a9a5a', bg:'rgba(60,140,70,.15)',   bd:'rgba(60,140,70,.4)'},
  confirmada:{label:'Confirmada',color:'#5599bb', bg:'rgba(85,153,187,.15)',  bd:'rgba(85,153,187,.4)'},
  pendiente: {label:'Pendiente', color:'#c89030', bg:'rgba(180,130,0,.15)',   bd:'rgba(180,130,0,.4)'},
  libre:     {label:'Libre',     color:'#7a8f96', bg:'rgba(100,120,130,.12)','bd':'rgba(100,120,130,.35)'},
  cancelada: {label:'Cancelada', color:'#cc4444', bg:'rgba(180,50,50,.15)',   bd:'rgba(180,50,50,.4)'},
};

let zonas = [
  {id:1, nombre:'Terraza', emoji:'☀️', mesas:8},
  {id:2, nombre:'Entrada', emoji:'🚪', mesas:4},
  {id:3, nombre:'Barra',   emoji:'🍷', mesas:6},
  {id:4, nombre:'Sala',    emoji:'🪑', mesas:10},
  {id:5, nombre:'Salón',   emoji:'🎭', mesas:6},
];

function hoyStr(){const d=new Date();return d.toISOString().split('T')[0];}
function manaStr(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];}

let reservas = [
  {id:1, nombre:'Familia Rodríguez', tel:'634 123 456', fecha:hoyStr(), hora:'14:30', pax:6, mesas:2, zonaId:1, estado:'confirmada', nota:''},
  {id:2, nombre:'Mesa García',       tel:'612 234 567', fecha:hoyStr(), hora:'21:00', pax:4, mesas:1, zonaId:3, estado:'pendiente',  nota:''},
  {id:3, nombre:'Cumple Laura',      tel:'699 345 678', fecha:hoyStr(), hora:'20:00', pax:10,mesas:3, zonaId:4, estado:'confirmada', nota:'Tarta de cumpleaños'},
  {id:4, nombre:'Ana Torres',        tel:'677 456 789', fecha:hoyStr(), hora:'21:30', pax:2, mesas:1, zonaId:5, estado:'pendiente',  nota:''},
  {id:5, nombre:'Reserva Mañana',    tel:'600 000 001', fecha:manaStr(),hora:'13:00', pax:4, mesas:1, zonaId:2, estado:'confirmada', nota:''},
];

/* ── UTILS ── */
function getZona(id){return zonas.find(z=>z.id===id);}
function formatDay(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return d.getDate()+' de '+months[d.getMonth()];
}
function formatDayFull(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  return days[d.getDay()]+', '+formatDay(dateStr);
}

/* ── TAB ── */
function setTab(t){
  ['res','ev','zon'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('act',x===t);
    document.getElementById('view-'+x).style.display=x===t?'':'none';
  });
  if(t==='res') renderRes();
  if(t==='zon') renderZon();
}

/* ── DATE NAV ── */
function initDay(){
  curDay=hoyStr();
  updateDateLbl();
}
function changeDay(d){
  const cur=new Date(curDay+'T00:00:00');
  cur.setDate(cur.getDate()+d);
  curDay=cur.toISOString().split('T')[0];
  updateDateLbl();
  renderRes();
}
function updateDateLbl(){
  const lbl=document.getElementById('res-date-lbl');
  const ylbl=document.getElementById('res-year-lbl');
  const hoy=hoyStr();
  const man=manaStr();
  if(curDay===hoy) lbl.textContent='Hoy — '+formatDay(curDay);
  else if(curDay===man) lbl.textContent='Mañana — '+formatDay(curDay);
  else lbl.textContent=formatDayFull(curDay);
  const yr=new Date(curDay+'T00:00:00').getFullYear();
  if(ylbl) ylbl.textContent=yr;
}

/* ── ZONA FILTER ── */
function setZona(id,el){
  curZona=id;
  document.querySelectorAll('#zona-bar .zpill').forEach(p=>p.classList.remove('act'));
  if(el) el.classList.add('act');
  renderRes();
}

/* ── MESAS ── */
function totalMesas(){return zonas.reduce((s,z)=>s+z.mesas,0);}
function mesasOcupadas(){
  return reservas
    .filter(r=>r.fecha===curDay && r.estado!=='cancelada' && r.estado!=='libre')
    .reduce((s,r)=>s+( r.mesas||1),0);
}
function toggleMesas(){
  const d=document.getElementById('mesas-detail');
  d.classList.toggle('show');
  if(d.classList.contains('show')) renderMesasDetail();
}
function renderMesasDetail(){
  const el=document.getElementById('mesas-detail');
  el.innerHTML=zonas.map(z=>{
    const ocp=reservas.filter(r=>r.fecha===curDay&&r.zonaId===z.id&&r.estado!=='cancelada'&&r.estado!=='libre').reduce((s,r)=>s+(r.mesas||1),0);
    const lib=z.mesas-ocp;
    return`<div class="mz-row"><span class="mz-name">${z.emoji} ${z.nombre}</span><span class="mz-count" style="color:${lib>0?'var(--grn)':'var(--red)'}">${lib} / ${z.mesas}</span></div>`;
  }).join('');
}
function updateMesasPill(){
  const lib=totalMesas()-mesasOcupadas();
  const el=document.getElementById('mesas-num');
  if(el) el.textContent=lib;
}

/* ── RENDER RESERVAS ── */
function secHdr(label,count){
  return`<div class="sec-hdr"><div class="sec-line"></div><div class="sec-lbl">${label}<span class="sec-badge">${count}</span></div><div class="sec-line"></div></div>`;
}

function resCard(r){
  const est=ESTADOS[r.estado]||ESTADOS.pendiente;
  return`<div class="res-card" style="border-color:${est.bd}" onclick="openDetail(${r.id})">
    <div class="res-stripe" style="background:${est.color}"></div>
    <div class="res-top">
      <div class="res-name">${r.nombre}</div>
      <div class="res-badge" style="background:${est.bg};border-color:${est.bd};color:${est.color}">${est.label}</div>
    </div>
    <div class="res-meta">
      <span class="res-meta-item">🕐 ${r.hora}</span>
      <span class="res-meta-item">👥 ${r.pax} pax</span>
      <span class="res-meta-item">🪑 ${r.mesas||1} mesa${(r.mesas||1)!==1?'s':''}</span>
      ${r.nota?`<span class="res-meta-item" style="color:var(--acc)">💬 ${r.nota}</span>`:''}
    </div>
  </div>`;
}

function renderRes(){
  updateMesasPill();
  const list=document.getElementById('res-list');
  const dayRes=reservas.filter(r=>r.fecha===curDay).sort((a,b)=>a.hora.localeCompare(b.hora));
  const filtered=curZona==='all'?dayRes:dayRes.filter(r=>r.zonaId===curZona);

  let h='';
  if(!filtered.length){
    h=`<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Sin reservas</div><div class="empty-sub">Pulsa el botón para añadir la primera reserva.</div></div>`;
  } else {
    const zonasToShow=curZona==='all'?zonas:zonas.filter(z=>z.id===curZona);
    zonasToShow.forEach(z=>{
      const zRes=filtered.filter(r=>r.zonaId===z.id);
      if(!zRes.length) return;
      h+=secHdr(z.emoji+' '+z.nombre, zRes.length);
      h+=zRes.map(r=>resCard(r)).join('');
    });
    const noZona=filtered.filter(r=>!zonas.find(z=>z.id===r.zonaId));
    if(noZona.length){h+=secHdr('📍 Sin zona',noZona.length);h+=noZona.map(r=>resCard(r)).join('');}
  }

  h+=`<div style="padding:0 14px 14px"><button class="add-btn" onclick="openNewRes()">+ Nueva reserva</button></div>`;
  list.innerHTML=h;
}

/* ── DETAIL (direct edit mode) ── */
function openDetail(id){
  // Direct edit mode — skip intermediate detail view
  openEditRes(id);
  return;
  // (kept below for reference)
  void(0);
}

function setEstado(id,estado){
  const r=reservas.find(x=>x.id===id);if(!r)return;
  r.estado=estado;
  openDetail(id);
  renderRes();
}

/* ── NEW / EDIT RES ── */
function fillZonaSelect(selectedId){
  const el=document.getElementById('e-zona-pills');if(!el)return;
  el.innerHTML=zonas.map(z=>`
    <div class="zona-pill${z.id===selectedId?' act':''}" onclick="selectZona(${z.id},this)">
      ${z.emoji} ${z.nombre}
    </div>`).join('');
  // Store selected value
  el.dataset.selected=selectedId||zonas[0]?.id||'';
}
function selectZona(id,el){
  document.querySelectorAll('#e-zona-pills .zona-pill').forEach(p=>p.classList.remove('act'));
  el.classList.add('act');
  document.getElementById('e-zona-pills').dataset.selected=id;
}
function getSelectedZona(){
  return parseInt(document.getElementById('e-zona-pills')?.dataset.selected)||zonas[0]?.id;
}
function fillEstadoPills(selectedEstado){
  const el=document.getElementById('e-estado-pills');if(!el)return;
  el.innerHTML=Object.entries(ESTADOS).map(([k,e])=>{
    const act=k===selectedEstado;
    return`<button class="est-pill" style="background:${act?e.bg:'transparent'};border-color:${act?e.bd:'var(--brd2)'};color:${act?e.color:'var(--dim)'}"
      onclick="selectEstado('${k}',this)" data-estado="${k}">${e.label}</button>`;
  }).join('');
}
function selectEstado(k,el){
  const est=ESTADOS[k];if(!est)return;
  document.querySelectorAll('#e-estado-pills .est-pill').forEach(p=>{
    const pk=p.dataset.estado;const pe=ESTADOS[pk];
    p.style.background='transparent';p.style.borderColor='var(--brd2)';p.style.color='var(--dim)';
  });
  el.style.background=est.bg;el.style.borderColor=est.bd;el.style.color=est.color;
  document.getElementById('e-estado-pills').dataset.selected=k;
}
function getSelectedEstado(){
  return document.getElementById('e-estado-pills')?.dataset.selected||'pendiente';
}
function openNewRes(){
  editingId=null;
  document.getElementById('edit-title').textContent='Nueva reserva';
  document.getElementById('edit-sub').textContent='';
  document.getElementById('btn-del-res').style.display='none';
  fillZonaSelect(zonas[0]?.id);
  fillEstadoPills('pendiente');
  document.getElementById('e-nombre').value='';
  document.getElementById('e-tel').value='';
  document.getElementById('e-fecha').value=curDay;
  document.getElementById('e-hora').value='';
  document.getElementById('e-pax').value='';
  document.getElementById('e-mesas').value='';
  document.getElementById('e-nota').value='';
  delete document.getElementById('e-pax').dataset.manual;
  delete document.getElementById('e-mesas').dataset.manual;
  showModal('ov-edit');
}
function openEditRes(id){
  const r=reservas.find(x=>x.id===id);if(!r)return;
  editingId=id;
  closeModal('ov-detail');
  document.getElementById('edit-title').textContent=r.nombre;
  const z=getZona(r.zonaId);
  document.getElementById('edit-sub').textContent=(z?z.emoji+' '+z.nombre+' · ':'')+r.hora;
  document.getElementById('btn-del-res').style.display='block';
  fillZonaSelect(r.zonaId);
  fillEstadoPills(r.estado);
  document.getElementById('e-nombre').value=r.nombre;
  document.getElementById('e-tel').value=r.tel;
  document.getElementById('e-fecha').value=r.fecha;
  document.getElementById('e-hora').value=r.hora;
  document.getElementById('e-pax').value=r.pax;
  document.getElementById('e-mesas').value=r.mesas||1;
  document.getElementById('e-nota').value=r.nota||'';
  showModal('ov-edit');
}
function autoPax(){
  const pax=parseInt(document.getElementById('e-pax').value)||0;
  const m=document.getElementById('e-mesas');
  if(!m.dataset.manual) m.value=Math.ceil(pax/PAX_PER_MESA)||'';
}
function autoMesas(){
  const mesas=parseInt(document.getElementById('e-mesas').value)||0;
  const p=document.getElementById('e-pax');
  if(!p.dataset.manual) p.value=mesas*PAX_PER_MESA||'';
  document.getElementById('e-mesas').dataset.manual='1';
}
function saveRes(){
  const nombre=document.getElementById('e-nombre').value.trim();
  if(!nombre){toast('Introduce un nombre');return;}
  const data={
    nombre,
    tel:   document.getElementById('e-tel').value.trim(),
    fecha: document.getElementById('e-fecha').value,
    hora:  document.getElementById('e-hora').value,
    pax:   parseInt(document.getElementById('e-pax').value)||1,
    mesas: parseInt(document.getElementById('e-mesas').value)||1,
    zonaId:getSelectedZona(),
    estado:getSelectedEstado(),
    nota:  document.getElementById('e-nota').value.trim(),
  };
  if(editingId){
    const r=reservas.find(x=>x.id===editingId);
    if(r) Object.assign(r,data);
  } else {
    reservas.push({id:++nid,...data});
  }
  closeModal('ov-edit');
  renderRes();
  toast(editingId?'Reserva actualizada ✓':'Reserva añadida ✓');
}
function delRes(){
  if(!editingId)return;
  const r=reservas.find(x=>x.id===editingId);if(!r)return;
  if(!confirm(`¿Eliminar reserva de ${r.nombre}?`))return;
  reservas=reservas.filter(x=>x.id!==editingId);
  closeModal('ov-edit');
  renderRes();
  toast('Reserva eliminada');
}

/* ── ZONAS ── */
function renderZon(){
  const list=document.getElementById('zon-list');
  list.innerHTML=zonas.map(z=>`
    <div style="background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin:0 14px 8px;display:flex;align-items:center;gap:10px;cursor:pointer" onclick="openEditZona(${z.id})">
      <span style="font-size:20px">${z.emoji}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--txt)">${z.nombre}</div>
        <div style="font-size:11px;color:var(--dim)">${z.mesas} mesas</div>
      </div>
      <span style="color:var(--faint);font-size:18px">›</span>
    </div>`).join('');
}
function openNewZona(){
  editingZonaId=null;
  document.getElementById('zona-title').textContent='Nueva zona';
  document.getElementById('btn-del-zona').style.display='none';
  document.getElementById('z-nombre').value='';
  document.getElementById('z-emoji').value='';
  document.getElementById('z-mesas').value='';
  showModal('ov-zona');
}
function openEditZona(id){
  const z=zonas.find(x=>x.id===id);if(!z)return;
  editingZonaId=id;
  document.getElementById('zona-title').textContent='Editar zona';
  document.getElementById('btn-del-zona').style.display='block';
  document.getElementById('z-nombre').value=z.nombre;
  document.getElementById('z-emoji').value=z.emoji;
  document.getElementById('z-mesas').value=z.mesas;
  showModal('ov-zona');
}
function saveZona(){
  const nombre=document.getElementById('z-nombre').value.trim();
  if(!nombre){toast('Introduce un nombre');return;}
  const data={nombre,emoji:document.getElementById('z-emoji').value||'📍',mesas:parseInt(document.getElementById('z-mesas').value)||1};
  if(editingZonaId){
    const z=zonas.find(x=>x.id===editingZonaId);
    if(z) Object.assign(z,data);
  } else {
    zonas.push({id:++nid,...data});
    // Add pill to zona-bar
    const bar=document.getElementById('zona-bar');
    const pill=document.createElement('div');
    pill.className='zpill';
    pill.innerHTML=`<span class="zpill-icon">${data.emoji}</span><span class="zpill-txt">${data.nombre}</span>`;
    pill.onclick=function(){setZona(zonas[zonas.length-1].id,this);};
    bar.appendChild(pill);
  }
  closeModal('ov-zona');
  renderZon();
  toast('Zona guardada ✓');
}
function delZona(){
  if(!editingZonaId)return;
  zonas=zonas.filter(x=>x.id!==editingZonaId);
  closeModal('ov-zona');
  renderZon();
  toast('Zona eliminada');
}

/* ── MODAL ── */
function showModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}

/* ── TOAST ── */
function toast(msg){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2f3a;border:1px solid var(--brd2);color:var(--txt);padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500);
}

/* ── STEPPER HELPER ── */
function stepField(id,delta,min,max,cb){
  const el=document.getElementById(id);if(!el)return;
  const v=Math.min(max,Math.max(min,(parseInt(el.value)||0)+delta));
  el.value=v;
  if(cb) cb();
}

/* ── INIT ── */
initDay();
renderRes();
</script>
</body>
