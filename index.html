<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>La Galería — Gestión</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--nav:#22292D;--acc:#C5A669;--brd:rgba(255,255,255,0.07);--faint:#4a5a60;--bnav-h:62px}
body{background:#111417;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* NAVBAR */
.navbar{background:var(--nav);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd);height:49px;flex-shrink:0;transition:background .3s}
.logo-g{display:flex;flex-direction:column;align-items:center;line-height:1}
.logo-g-neo{font-size:7px;letter-spacing:2.5px;color:var(--acc);text-transform:uppercase;margin-bottom:1px}
.logo-g-main{font-size:16px;color:var(--acc);font-family:Georgia,serif;letter-spacing:4px}
.logo-g-deco{display:flex;align-items:center;gap:4px;margin-top:1px}
.logo-g-line{width:18px;height:.5px;background:rgba(197,166,105,.4)}
.logo-g-sub{font-size:6px;letter-spacing:2px;color:var(--acc);opacity:.6;text-transform:uppercase}
.logo-s{display:flex;flex-direction:column;align-items:center;line-height:1}
.logo-s-main{font-size:18px;color:#fff;font-family:Georgia,serif;letter-spacing:2px;font-weight:700}
.logo-s-sub{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.65);text-transform:uppercase;margin-top:2px}
.local-sw{display:flex;gap:3px;background:rgba(0,0,0,.25);border-radius:8px;padding:3px}
.lbtn{border:none;border-radius:6px;padding:5px 9px;font-size:11px;cursor:pointer;font-weight:600;background:transparent;color:rgba(255,255,255,.45);transition:all .2s;white-space:nowrap}
.lbtn.active-g{background:var(--acc);color:#22292D}
.lbtn.active-s{background:#fff;color:#A32B2A}
@media(max-width:360px){
  .local-sw{display:none}
  .local-sel-wrap{display:block}
}
.local-sel-wrap{display:none}
.local-sel{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:5px 10px;font-size:12px;color:#fff;font-weight:600;outline:none;cursor:pointer}

/* IFRAME CONTAINER */
.pages{flex:1;position:relative;overflow:hidden}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none}
iframe.active{display:block}

/* BOTTOM NAV */
.bottom-nav{height:var(--bnav-h);background:var(--nav);border-top:1px solid var(--brd);display:flex;flex-shrink:0;transition:background .3s}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:6px 4px;border:none;background:transparent}
.bnav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:var(--faint)}
.bnav-label{font-size:10px;font-weight:500;color:var(--faint)}
.bnav-item.active .bnav-icon,.bnav-item.active .bnav-label{color:var(--acc)}
.bnav-item:active{opacity:.7}
body.sala .navbar{background:#A32B2A}
body.sala .bottom-nav{background:#8a1f1f}
body.sala .bnav-item.active .bnav-icon,
body.sala .bnav-item.active .bnav-label{color:#fff}
</style>
</head>
<body>

<div class="navbar" id="navbar">
  <div id="logo-area">
    <div class="logo-g">
      <div class="logo-g-neo">— NEOTABERNA —</div>
      <div class="logo-g-main">LA GALERÍA</div>
      <div class="logo-g-deco"><div class="logo-g-line"></div><div class="logo-g-sub">— Y ALGO MÁS —</div><div class="logo-g-line"></div></div>
    </div>
  </div>
  <div class="local-sw">
    <button class="lbtn active-g" id="btn-g" onclick="setLocal('galeria')">La Galería</button>
    <button class="lbtn" id="btn-s" onclick="setLocal('sala')">La Sala</button>
  </div>
  <div class="local-sel-wrap">
    <select class="local-sel" onchange="setLocal(this.value)">
      <option value="galeria">La Galería</option>
      <option value="sala">La Sala</option>
    </select>
  </div>
</div>

<div class="pages">
  <iframe id="fr-turnos"   src="lagaleria_turnos.html"   class="active"></iframe>
  <iframe id="fr-reservas" src="lagaleria_reservas.html"  loading="lazy"></iframe>
  <iframe id="fr-stock"    src="lagaleria_stock.html"     loading="lazy"></iframe>
</div>

<nav class="bottom-nav">
  <button class="bnav-item active" id="bnav-turnos" onclick="goTo('turnos')">
    <div class="bnav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <span class="bnav-label">Turnos</span>
  </button>
  <button class="bnav-item" id="bnav-reservas" onclick="goTo('reservas')">
    <div class="bnav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
        <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
      </svg>
    </div>
    <span class="bnav-label">Reservas</span>
  </button>
  <button class="bnav-item" id="bnav-stock" onclick="goTo('stock')">
    <div class="bnav-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
    </div>
    <span class="bnav-label">Stock</span>
  </button>
</nav>

<script>
var curPage = 'turnos';

function goTo(page) {
  // Hide all iframes
  ['turnos','reservas','stock'].forEach(function(p) {
    document.getElementById('fr-' + p).classList.remove('active');
    document.getElementById('bnav-' + p).classList.remove('active');
  });
  // Show selected
  document.getElementById('fr-' + page).classList.add('active');
  document.getElementById('bnav-' + page).classList.add('active');
  curPage = page;
}

function setLocal(local) {
  var isG = local === 'galeria';
  // Update shell navbar
  document.body.classList.toggle('sala', !isG);
  document.getElementById('btn-g').className = 'lbtn' + (isG ? ' active-g' : '');
  document.getElementById('btn-s').className = 'lbtn' + (isG ? '' : ' active-s');
  // Update logo
  document.getElementById('logo-area').innerHTML = isG
    ? '<div class="logo-g"><div class="logo-g-neo">— NEOTABERNA —</div><div class="logo-g-main">LA GALERÍA</div><div class="logo-g-deco"><div class="logo-g-line"></div><div class="logo-g-sub">— Y ALGO MÁS —</div><div class="logo-g-line"></div></div></div>'
    : '<div class="logo-s"><div class="logo-s-main">LA SALA</div><div class="logo-s-sub">VUELTA AL ORIGEN · BAR</div></div>';
  // Tell each iframe about the local change
  ['turnos','reservas','stock'].forEach(function(p) {
    var fr = document.getElementById('fr-' + p);
    try {
      if (fr.contentWindow && fr.contentWindow.setLocal) {
        fr.contentWindow.setLocal(local);
      }
    } catch(e) {}
  });
}
</script>
</body>
</html>
